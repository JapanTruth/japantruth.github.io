---
layout: default
---

<ul class="post-list">
  {% for post in site.posts %}
  <li class="post-card">
    <p class="post-date">{{ post.date | date: "%Y年%m月%d日" }}</p>
    <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
    <p class="excerpt">{{ post.excerpt | strip_html | truncate: 100 }}</p>
  </li>
  {% endfor %}
</ul>
