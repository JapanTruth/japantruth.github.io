<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script defer src="https://umami-k7cetfbjq-japantruths-projects.vercel.app/script.js" data-website-id="2a1bde68-2f84-4fc2-91d3-cbc9c80f1cbd"></script>
  <!-- OGP -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 100 }}">
  <meta property="og:url" content="{{ site.url }}{{ page.url }}">
  {% if page.image %}
  <meta property="og:image" content="{{ site.url }}{{ page.image }}">
  {% endif %}
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@JapanTruth">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 100 }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate" type="application/rss+xml" title="JapanTruth" href="/feed.xml">
  <!-- 1. まずconfigを定義 -->
  <script>
    var unlockProtocolConfig = {
      locks: {
        '0xaD740e0476baf6336d4ac88c4ae322a58b327e75': {
          network: 8453,
          name: 'JapanTruth Premium'
        }
      },
      skipRecipient: true,
      title: 'JapanTruth Premium',
      icon: 'https://japantruth.github.io/assets/images/japantruth-nft.png',
      callToAction: {
        default: 'JapanTruth Premiumに加入して限定記事を読む'
      }
    }
  </script>
  <!-- 2. その後にUnlockスクリプトを読み込む -->
  <script>
    (function(d, s) {
      var js = d.createElement(s), sc = d.getElementsByTagName(s)[0];
      js.src="https://paywall.unlock-protocol.com/static/unlock.latest.min.js";
      sc.parentNode.insertBefore(js, sc);
    }(document, "script"));
  </script>
</head>
<body>
  <header>
    <div class="header-top">
      <a class="site-title" href="/">Japan<span>Truth</span></a>
      <div class="header-right">
        <span class="header-date">{{ site.time | date: "%Y年%m月%d日" }}</span>
        <button class="wallet-button" id="wallet-btn" onclick="window.unlockProtocol && window.unlockProtocol.loadCheckoutModal()">
          ウォレット接続
        </button>
        <span class="wallet-address" id="wallet-address" style="display:none;"></span>
      </div>
    </div>
    <nav>
      <a href="/">最新</a>
      <a href="/categories/politics/">政治</a>
      <a href="/categories/economy/">経済</a>
      <a href="/categories/international/">国際</a>
      <a href="/categories/culture/">文化</a>
      <a href="/categories/investment/">投資</a>
      <a href="/about/">理念</a>
    </nav>
  </header>
  <div class="hero">
    <h1>日本の常識を疑え</h1>
    <p>海外、国内の一次情報を事実の通り日本語で届ける独立メディア。</p>
  </div>
  <main>
    {{ content }}
  </main>
  <!-- プレミアム会員 -->
  <div class="premium-section">
    <p class="premium-title">JapanTruth Premium</p>
    <p class="premium-subtitle">有料限定記事へのアクセス権をNFTで取得する</p>
    <button class="premium-button" onclick="window.unlockProtocol && window.unlockProtocol.loadCheckoutModal()">
      プレミアム会員になる — 月額5ドル
    </button>
  </div>
  <footer>
    <p><strong>JapanTruth</strong> — 権力に屈しない独立メディア</p>
    <br>
    <p>このメディアを支援する</p>
    <p class="btc-address">Bitcoin: bc1q3e9ju9pdeurhekjdusqn8cwqr3ft57wtn9j6yp</p>
  </footer>
  <script>
    window.addEventListener('unlockProtocol.authenticated', function(e) {
      const address = e.detail.address;
      const short = address.slice(0, 6) + '...' + address.slice(-4);
      document.getElementById('wallet-btn').style.display = 'none';
      document.getElementById('wallet-address').style.display = 'inline';
      document.getElementById('wallet-address').textContent = '🔓 ' + short;
    });
  </script>
</body>
</html>
