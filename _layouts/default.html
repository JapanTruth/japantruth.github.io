<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <script defer src="https://umami-k7cetfbjq-japantruths-projects.vercel.app/script.js" data-website-id="2a1bde68-2f84-4fc2-91d3-cbc9c80f1cbd"></script>
        <!-- OGP -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 100 }}">
    <meta property="og:url" content="{{ site.url }}{{ page.url }}">
    {% if page.image %}
    <meta property="og:image" content="{{ site.url }}{{ page.image }}">
    {% endif %}
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@JapanTruth">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 100 }}">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="alternate" type="application/rss+xml" title="JapanTruth" href="/feed.xml">
</head>
<body>

 <header>
  <div class="header-top">
    <a class="site-title" href="/">Japan<span>Truth</span></a>
    <span class="header-date">{{ site.time | date: "%Y年%m月%d日" }}</span>
  </div>
   <nav>
      <a href="/">最新</a>
      <a href="/categories/politics/">政治</a>
      <a href="/categories/economy/">経済</a>
      <a href="/categories/international/">国際</a>
      <a href="/categories/culture/">文化</a>
      <a href="/categories/investment/">投資</a>
      <a href="/about/">理念</a>
    </nav>
  </header>

  <div class="hero">
    <h1>日本の常識を疑え</h1>
    <p>海外、国内の一次情報を事実の通り日本語で届ける独立メディア。</p>
  </div>

  <main>
    {{ content }}
  </main>

  <footer>
    <p><strong>JapanTruth</strong> — 権力に屈しない独立メディア</p>
    <br>
    <p>このメディアを支援する</p>
    <p class="btc-address">Bitcoin: bc1q3e9ju9pdeurhekjdusqn8cwqr3ft57wtn9j6yp</p>
  </footer>

</body>
</html>
