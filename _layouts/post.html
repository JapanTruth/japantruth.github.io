---
layout: default
---
<div class="post-content">
  <div class="post-header">
    <h1>{{ page.title }}</h1>
    <p class="meta">
      {{ page.date | date: "%Y年%m月%d日 %H:%M" }}
      {% if page.source %}
      ｜ ソース：
      {% if page.source_url %}
      <a href="{{ page.source_url }}" target="_blank">{{ page.source }}</a>
      {% else %}
      {{ page.source }}
      {% endif %}
      {% endif %}
    </p>
  </div>
  {{ content }}
  
  <!-- Xシェアボタン -->
  <div class="share-section">
    <p class="share-label">この記事をシェアする</p>
    <a class="share-button" 
       href="https://twitter.com/intent/tweet?text={{ page.title | url_encode }}&url={{ site.url | append: page.url | url_encode }}&via=JapanTruth" 
       target="_blank">
      𝕏 でシェア
    </a>
  </div>
</div>
